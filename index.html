<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YSC Fichaje</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .card {
    background: white;
    border-radius: 16px;
    padding: 2.5rem 2rem;
    max-width: 360px;
    width: 100%;
    text-align: center;
    box-shadow: 0 2px 20px rgba(0,0,0,0.08);
  }
  .icon {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.5rem;
    font-size: 32px;
  }
  .icon.entrada { background: #EAF3DE; }
  .icon.salida  { background: #FAECE7; }
  .icon.error   { background: #FCEBEB; }
  .icon.loading { background: #F1EFE8; }
  h1 {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 0.5rem;
    color: #1a1a1a;
  }
  .hora {
    font-size: 32px;
    font-weight: 700;
    margin: 1rem 0;
    color: #1a1a1a;
  }
  .fecha {
    font-size: 14px;
    color: #888;
    margin-bottom: 1.5rem;
  }
  .badge {
    display: inline-block;
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 1rem;
  }
  .badge.entrada { background: #EAF3DE; color: #27500A; }
  .badge.salida  { background: #FAECE7; color: #4A1B0C; }
  .badge.error   { background: #FCEBEB; color: #501313; }
  .msg {
    font-size: 14px;
    color: #666;
    line-height: 1.5;
  }
  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid #e0e0e0;
    border-top-color: #888;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card" id="card">
  <div class="icon loading">⏳</div>
  <h1>Verificando...</h1>
  <p class="msg">Por favor espera</p>
</div>

<script>
const ROTATION_MINUTES = 5;

function getParams() {
  const p = new URLSearchParams(window.location.search);
  return {
    type:  p.get('type'),
    token: p.get('token'),
    base:  p.get('base'),
    table: p.get('table'),
    key:   p.get('key')
  };
}

function getTimeSlot() {
  return Math.floor(Date.now() / (ROTATION_MINUTES * 60 * 1000));
}

function isTokenValid(token, type) {
  const slot = getTimeSlot();
  const validTokens = [
    `${type}-${slot}-ysc`,
    `${type}-${slot - 1}-ysc`
  ];
  return validTokens.includes(token);
}

function formatHora(date) {
  return date.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
}

function formatFecha(date) {
  return date.toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
}

function showError(msg) {
  document.getElementById('card').innerHTML = `
    <div class="icon error">✗</div>
    <h1>QR no válido</h1>
    <p class="msg">${msg}</p>
  `;
}

function showSuccess(type, hora, fecha) {
  const label = type === 'entrada' ? 'Entrada' : 'Salida';
  document.getElementById('card').innerHTML = `
    <div class="icon ${type}">${type === 'entrada' ? '✓' : '✓'}</div>
    <span class="badge ${type}">${label} registrada</span>
    <div class="hora">${hora}</div>
    <div class="fecha">${fecha}</div>
    <p class="msg">Tu fichaje ha sido guardado correctamente.</p>
  `;
}

async function registrar(params, now) {
  const body = {
    fields: {
      Tipo: params.type,
      Hora: now.toISOString()
    }
  };

  const res = await fetch(`https://api.airtable.com/v0/${params.base}/${params.table}`, {
    method: 'POST',
    headers: {
      Authorization: `Bearer ${params.key}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(body)
  });

  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.error?.message || 'Error al guardar');
  }
}

async function init() {
  const params = getParams();

  if (!params.type || !params.token || !params.base || !params.table || !params.key) {
    showError('Faltan parámetros. Escanea el QR correcto.');
    return;
  }

  if (!['entrada', 'salida'].includes(params.type)) {
    showError('Tipo de fichaje no reconocido.');
    return;
  }

  if (!isTokenValid(params.token, params.type)) {
    showError('Este QR ha caducado. Pide al responsable que muestre el QR actualizado.');
    return;
  }

  const now = new Date();

  try {
    await registrar(params, now);
    showSuccess(params.type, formatHora(now), formatFecha(now));
  } catch(e) {
    showError('No se pudo guardar el fichaje. Inténtalo de nuevo.');
    console.error(e);
  }
}

init();
</script>
</body>
</html>
